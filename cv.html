<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Viewer</title>

  <style>
    @font-face {
      font-family: "Akkurat Pro";
      src: local("Akkurat Pro"), local("Akkurat");
    }

    :root {
      --bg: #FFFDDB;
      --text: #586c5c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .viewer {
      flex: 1;
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      body {
        height: auto;
      }

      .viewer {
        height: auto;
      }

      iframe {
        height: 100vh;
      }
    }
  </style>
</head>
<body>

  <div class="viewer">
    <iframe src="montymorris-cv.pdf"></iframe>
  </div>

</body>
</html>
