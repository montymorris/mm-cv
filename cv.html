<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV</title>

  <style>
    :root {
      --bg: #FFFDDB;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
    }

    .viewer {
      width: 100vw;
      height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Mobile: allow proper scaling and full fill */
    @media (max-width: 768px) {
      html, body {
        overflow: auto;
      }

      .viewer {
        height: 100vh;
      }

      iframe {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div class="viewer">
    <iframe src="montymorris-cv.pdf"></iframe>
  </div>
</body>
</html>
